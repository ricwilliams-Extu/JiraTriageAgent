# Local dev only — NOT verified with a real `docker compose up` in the
# session that authored this (no Docker available in that environment).
# Smoke-test before trusting it, especially: the mcp-atlassian image tag
# (pin a real version instead of `latest`), the exact default port/mount
# path for its streamable-http transport, and whether its base image
# actually has python3 (used below for the healthcheck, since curl's
# presence in that image was not confirmed either).

services:
  coordinator:
    build:
      context: .
      dockerfile: apps/coordinator/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      # Compose service name, not localhost — only valid once Coordinator
      # and the sidecar share a single Azure Container App (Phase 6).
      MCP_ATLASSIAN_URL: "http://mcp-atlassian:8000/mcp"
    env_file:
      - .env.local
    depends_on:
      mcp-atlassian:
        condition: service_healthy
    networks:
      - jira-triage

  mcp-atlassian:
    # Pin an actual version tag before relying on this for anything beyond
    # local smoke-testing — `latest` was the only reference found during
    # this phase's research pass.
    image: ghcr.io/sooperset/mcp-atlassian:latest
    command: ["--transport", "streamable-http", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      TRANSPORT: "streamable-http"
      PORT: "8000"
      HOST: "0.0.0.0"
      # Scoped to exactly what Coordinator calls (jira.ts) — not the
      # server's full ~98-tool default set. Required now, not just a
      # hardening nice-to-have, since this same sidecar config pattern
      # will eventually point at production JIRA credentials.
      ENABLED_TOOLS: "jira_get_issue,jira_add_comment,jira_update_issue"
    env_file:
      - .env.local
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jira-triage

networks:
  jira-triage:
    driver: bridge
